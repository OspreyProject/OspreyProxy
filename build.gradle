plugins {
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'maven-publish'
    id 'java'
}

group = 'net.foulest'
description = 'OspreyProxy'

// Set the language level to Java 21
java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.github.ben-manes.caffeine:caffeine:3.2.4'
    implementation 'com.bucket4j:bucket4j_jdk17-core:8.19.0'
    implementation 'org.apache.httpcomponents.client5:httpclient5:5.5.1' // KEEP ON 5.5.1
    implementation 'org.springframework.boot:spring-boot-starter-web:4.1.0'
    implementation 'com.google.guava:guava:33.6.0-jre'

    // Actuator + Micrometer - for metrics and health endpoints
    // https://docs.spring.io/spring-boot/docs/current/reference/html/actuator.html
    implementation 'org.springframework.boot:spring-boot-starter-actuator:4.1.0'
    implementation 'io.micrometer:micrometer-registry-prometheus:1.17.0'

    // Resilience4j - for circuit breaking on upstream API providers
    // https://resilience4j.readme.io/docs/getting-started
    implementation 'io.github.resilience4j:resilience4j-spring-boot4:2.4.0'
    implementation 'io.github.resilience4j:resilience4j-micrometer:2.4.0'

    // JetBrains Annotations - for code inspection and documentation
    // https://mvnrepository.com/artifact/org.jetbrains/annotations
    compileOnly 'org.jetbrains:annotations:26.1.0'

    // Lombok - for reducing boilerplate code
    // https://projectlombok.org
    compileOnly 'org.projectlombok:lombok:1.18.46'
    annotationProcessor 'org.projectlombok:lombok:1.18.46'
}

tasks {
    bootJar {
        archiveFileName.set("${project.name}.jar")
        reproducibleFileOrder = true
        preserveFileTimestamps = false
    }

    bootRun {
        jvmArgs = [
                '-server',
                '-XX:+UseZGC',
                '-XX:+ZGenerational',
                '-XX:InitialRAMPercentage=12.5',
                '-XX:MaxRAMPercentage=25.0',
                '-XX:MaxDirectMemorySize=512m',
                '-XX:+UnlockDiagnosticVMOptions',
                '-XX:+DebugNonSafepoints',
                '-XX:+AlwaysPreTouch'
        ]
    }

    build {
        dependsOn(bootJar)
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = 'net.foulest.ospreyproxy'
            artifactId = project.name
            version = project.version
            from components.java
        }
    }
}

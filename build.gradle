plugins {
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'maven-publish'
    id 'java'
}

group = 'net.foulest'
description = 'OspreyProxy'

// Set the language level to Java 21
java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(21))
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.github.ben-manes.caffeine:caffeine:3.2.3'
    implementation 'com.bucket4j:bucket4j_jdk17-core:8.16.1'

    implementation('org.springframework.boot:spring-boot-starter-webflux') {
        // Exclude Reactor debug agent
        exclude group: 'io.projectreactor', module: 'reactor-tools'
    }

    // JetBrains Annotations - for code inspection and documentation
    // https://mvnrepository.com/artifact/org.jetbrains/annotations
    compileOnly 'org.jetbrains:annotations:26.1.0'

    // Lombok - for reducing boilerplate code
    // https://projectlombok.org
    compileOnly 'org.projectlombok:lombok:1.18.42'
    annotationProcessor 'org.projectlombok:lombok:1.18.42'
}

// Generates build-info.properties with Git commit hash before compilation.
// This file is included in the JAR and read by PrivacyHandler at runtime.
tasks.register('generateBuildInfo') {
    final def outputDir = layout.buildDirectory.dir('resources/main')
    final def outputFile = outputDir.map { it.file('build-info.properties') }
    outputs.file(outputFile)

    doLast {
        def commit = 'unknown'

        try {
            final def result = providers.exec {
                commandLine 'git', 'rev-parse', 'HEAD'
            }
            commit = result.standardOutput.asText.get().trim()
        } catch (final Exception ignored) {
        }

        outputDir.get().asFile.mkdirs()
        outputFile.get().asFile.text = "ospreyproxy.build.commit=${commit}\n"
    }
}

tasks {
    bootJar {
        archiveFileName.set("${project.name}.jar")

        // Reproducible build: fixed file order and timestamps so the same
        // source always produces the same JAR byte-for-byte.
        reproducibleFileOrder = true
        preserveFileTimestamps = false
    }

    processResources {
        dependsOn 'generateBuildInfo'
    }

    bootRun {
        jvmArgs = [
                '-server',
                '-XX:+UseZGC',
                '-XX:+ZGenerational',
                '-XX:InitialRAMPercentage=12.5',
                '-XX:MaxRAMPercentage=25.0',
                '-XX:MaxDirectMemorySize=512m',
                '-XX:+UnlockDiagnosticVMOptions',
                '-XX:+DebugNonSafepoints',
                '-XX:+AlwaysPreTouch'
        ]
    }

    build {
        dependsOn(bootJar)
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = 'net.foulest.ospreyproxy'
            artifactId = project.name
            version = project.version
            from components.java
        }
    }
}

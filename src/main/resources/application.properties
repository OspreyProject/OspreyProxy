# Server config
server.address=127.0.0.1
server.max-http-request-header-size=8KB
server.server-header=
# Netty config
server.netty.connection-timeout=5s
server.netty.idle-timeout=10s
server.netty.max-keep-alive-requests=100
# Spring config
spring.main.banner-mode=off
spring.main.web-application-type=reactive
spring.webflux.problemdetails.enabled=false
spring.reactor.debug-agent.enabled=false
spring.web.error.include-binding-errors=never
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never
spring.web.resources.add-mappings=false
# Logging config
logging.level.root=WARN
# Reactor config
reactor.netty.http.server.accessLogEnabled=false
# Stress test mode - bypasses all upstream provider calls and returns fake responses
# Set to true only for load testing. MUST be false in production!
ospreyproxy.stress-test-mode=false
# Netty resource leak detection level (DISABLED, SIMPLE, ADVANCED, PARANOID)
# Use PARANOID or ADVANCED during development/testing to detect leaks.
ospreyproxy.netty.leak-detection=DISABLED

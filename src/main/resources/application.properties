# Sets the web application type to servlet
spring.main.web-application-type=servlet

# Only binds to localhost if Nginx is in front
server.address=127.0.0.1

# Forwards headers from Nginx for correct IP rate limiting
server.forward-headers-strategy=NATIVE

# Disables the Spring Boot banner (don't leak version info on startup)
spring.main.banner-mode=off

# Suppresses Tomcat version from HTTP response headers
server.server-header=

# Limits request header size to prevent header injection attacks
server.max-http-request-header-size=8KB

# Caps Tomcat thread pool to limit blast radius of connection floods
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

# Second layer body size cap at the Tomcat connector level
server.tomcat.max-swallow-size=10KB

# Enables Problem Details for Spring Web MVC to provide standardized error responses
spring.mvc.problemdetails.enabled=true

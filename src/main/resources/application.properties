# ---------------------------------------------
# Server config
# ---------------------------------------------
server.address=127.0.0.1
# Do NOT let Spring trust X-Forwarded-* headers automatically;
# Nginx is the only trusted intermediary and sets X-Real-IP directly.
server.forward-headers-strategy=NONE
server.max-http-request-header-size=8KB
server.server-header=
# ---------------------------------------------
# Tomcat config
# ---------------------------------------------
server.tomcat.connection-timeout=5000
server.tomcat.keep-alive-timeout=10000
server.tomcat.max-http-form-post-size=10KB
server.tomcat.max-keep-alive-requests=1000
server.tomcat.max-swallow-size=10240
# ---------------------------------------------
# Spring MVC config
# ---------------------------------------------
spring.main.banner-mode=off
# Must be SERVLET for Spring MVC, not REACTIVE
spring.main.web-application-type=SERVLET
spring.mvc.problemdetails.enabled=false
spring.output.ansi.enabled=NEVER
spring.servlet.multipart.enabled=false
spring.servlet.multipart.max-file-size=10KB
spring.servlet.multipart.max-request-size=10KB
spring.threads.virtual.enabled=true
spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.whitelabel.enabled=false
spring.web.resources.add-mappings=false
# ---------------------------------------------
# Scheduling config (@Scheduled in MetricsService)
# ---------------------------------------------
spring.task.scheduling.pool.size=1
spring.task.scheduling.thread-name-prefix=metrics-
# ---------------------------------------------
# Actuator config
# Expose only health + prometheus on a separate internal-only port (9090).
# The main server.port stays on 127.0.0.1 and is Nginx-facing.
# Nginx should NOT proxy /actuator - bind management to a port only reachable locally.
# ---------------------------------------------
management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.access.default=none
management.endpoint.health.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
# Prevents actuator from adding its own error page mappings
management.endpoints.web.base-path=/actuator
# ---------------------------------------------
# Resilience4j circuit breaker defaults
# ---------------------------------------------
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=6s
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=80
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.record-exceptions[0]=java.io.IOException
resilience4j.circuitbreaker.configs.default.record-exceptions[1]=java.net.SocketTimeoutException
resilience4j.circuitbreaker.configs.default.record-exceptions[2]=org.apache.hc.client5.http.ConnectTimeoutException
resilience4j.circuitbreaker.configs.default.record-exceptions[3]=org.apache.hc.core5.http.NoHttpResponseException
# ---------------------------------------------
# Logging config
# ---------------------------------------------
logging.level.org.apache.hc.client5.http=ERROR
logging.level.org.apache.hc.core5=ERROR
logging.level.org.springframework.web.servlet.PageNotFound=ERROR
logging.level.root=WARN
logging.pattern.console=%d{MMM dd HH:mm:ss} [%level] [%t] %logger{0}: %msg%n
